name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (self-contained single-file)
        run: >
          dotnet publish src/X3DCcdOptimizer/X3DCcdOptimizer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o ./publish

      # Code signing via SignPath — uncomment after SignPath approval
      # See: https://about.signpath.io/documentation/github-actions
      #
      # - name: Upload artifact for signing
      #   id: upload-for-signing
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: unsigned-exe
      #     path: ./publish/X3DCcdOptimizer.exe
      #
      # - name: Sign with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: x3d-ccd-optimizer
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-id: ${{ steps.upload-for-signing.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: ./publish

      - name: Prepare release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "X3DCcdOptimizer-${tag}-win-x64.zip"

          New-Item -ItemType Directory -Path ./release-staging -Force
          Copy-Item ./publish/X3DCcdOptimizer.exe ./release-staging/
          Copy-Item ./LICENSE ./release-staging/ -ErrorAction SilentlyContinue
          Copy-Item ./README.md ./release-staging/

          Compress-Archive -Path ./release-staging/* -DestinationPath ./$zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./${{ env.ZIP_NAME }}
