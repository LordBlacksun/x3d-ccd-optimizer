name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (framework-dependent single-file)
        run: >
          dotnet publish src/X3DCcdOptimizer/X3DCcdOptimizer.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true -o ./publish

      - name: Prepare release zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "X3DCcdOptimizer-${tag}-win-x64.zip"

          New-Item -ItemType Directory -Path ./release-staging -Force
          Copy-Item ./publish/X3DCcdOptimizer.exe ./release-staging/
          Copy-Item ./src/X3DCcdOptimizer/Data/known_games.json ./release-staging/
          Copy-Item ./src/X3DCcdOptimizer/Resources/app.ico ./release-staging/ -ErrorAction SilentlyContinue
          Copy-Item ./LICENSE ./release-staging/ -ErrorAction SilentlyContinue
          Copy-Item ./README.md ./release-staging/

          Compress-Archive -Path ./release-staging/* -DestinationPath ./$zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ./${{ env.ZIP_NAME }}
