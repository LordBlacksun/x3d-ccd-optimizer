name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Run tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish (framework-dependent)
        run: >
          dotnet publish src/X3DCcdOptimizer/X3DCcdOptimizer.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=false
          -o ./publish-fd

      - name: Publish (self-contained)
        run: >
          dotnet publish src/X3DCcdOptimizer/X3DCcdOptimizer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o ./publish-sc

      # Code signing via SignPath — uncomment after SignPath approval
      # See: https://about.signpath.io/documentation/github-actions
      #
      # - name: Upload artifact for signing
      #   id: upload-for-signing
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: unsigned-exe
      #     path: ./publish/X3DCcdOptimizer.exe
      #
      # - name: Sign with SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: x3d-ccd-optimizer
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: exe
      #     github-artifact-id: ${{ steps.upload-for-signing.outputs.artifact-id }}
      #     wait-for-completion: true
      #     output-artifact-directory: ./publish

      - name: Prepare release zips
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"

          # Framework-dependent ZIP (small, requires .NET 8 Desktop Runtime)
          $fdZip = "X3DCcdOptimizer-${tag}-win-x64.zip"
          New-Item -ItemType Directory -Path ./staging-fd -Force
          New-Item -ItemType Directory -Path ./staging-fd/amd64 -Force
          Copy-Item ./publish-fd/X3DCcdOptimizer.exe ./staging-fd/
          Copy-Item ./publish-fd/e_sqlite3.dll ./staging-fd/ -ErrorAction SilentlyContinue
          Copy-Item ./publish-fd/amd64/KernelTraceControl.dll ./staging-fd/amd64/ -ErrorAction SilentlyContinue
          Copy-Item ./LICENSE ./staging-fd/ -ErrorAction SilentlyContinue
          Copy-Item ./README.md ./staging-fd/
          Compress-Archive -Path ./staging-fd/* -DestinationPath ./$fdZip

          # Self-contained ZIP (larger, no runtime needed)
          $scZip = "X3DCcdOptimizer-${tag}-win-x64-standalone.zip"
          New-Item -ItemType Directory -Path ./staging-sc -Force
          Copy-Item ./publish-sc/X3DCcdOptimizer.exe ./staging-sc/
          Copy-Item ./LICENSE ./staging-sc/ -ErrorAction SilentlyContinue
          Copy-Item ./README.md ./staging-sc/
          Compress-Archive -Path ./staging-sc/* -DestinationPath ./$scZip

          echo "FD_ZIP=$fdZip" >> $env:GITHUB_ENV
          echo "SC_ZIP=$scZip" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./${{ env.FD_ZIP }}
            ./${{ env.SC_ZIP }}
